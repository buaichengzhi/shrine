<!DOCTYPE html>
<html lang="zh">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <meta charset="utf-8" />
    <!-- 关键：确保移动端自适应 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        #ui-layer {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none; /* 让鼠标点击穿透到画布，除非点击到子元素 */
        }
        
        #ui-layer * { pointer-events: auto; }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.5rem); /* 根据分辨率自适应字体大小 */
            margin-bottom: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        @media (min-width: 600px) {
            .input-group { flex-direction: row; justify-content: center; }
        }

        input {
            padding: 12px 15px;
            width: 100%;
            max-width: 300px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
        }

        button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: #6200ee;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #7722ff; transform: scale(1.05); }

        #more-icon {
            position: absolute;
            bottom: 5vh;
            right: 5vw;
            color: white;
            text-decoration: none;
            font-size: 24px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>你想给我什么答案？<br>What answer are you gonna give me?</h1>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="输入你的答案...">
            <button onclick="handleSubmit()">提交 Submit</button>
        </div>
    </div>
    
    <a href="data.html" id="more-icon" title="查看更多数据">📜</a>

    <script>
        let particles = [];
        let nodeCount = 0;
        let connectionDist = 150;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            adjustConfig(); // 根据分辨率调整粒子连线距离
            loadDataAndInit();
        }

        function draw() {
            background(10, 10, 25); 
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].display();
                for (let j = i + 1; j < particles.length; j++) {
                    let d = dist(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    if (d < connectionDist) {
                        stroke(100, 150, 255, map(d, 0, connectionDist, 200, 0));
                        strokeWeight(1);
                        line(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    }
                }
            }
        }

        function loadDataAndInit() {
            let data = JSON.parse(localStorage.getItem('formData') || "[]");
            nodeCount = data.length;
            initParticles();
        }

        function handleSubmit() {
            const inputVal = document.getElementById('userInput').value;
            if (!inputVal.trim()) return;

            let data = JSON.parse(localStorage.getItem('formData') || "[]");
            const newEntry = {
                id: Date.now(),
                content: inputVal,
                timestamp: new Date().toLocaleString()
            };
            data.push(newEntry);
            localStorage.setItem('formData', JSON.stringify(data));

            nodeCount = data.length;
            initParticles();
            document.getElementById('userInput').value = "";
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < nodeCount; i++) {
                particles.push(new Particle());
            }
        }

        function adjustConfig() {
            // 如果是小屏幕（如手机），缩小连线距离，防止画面太乱
            if (windowWidth < 600) {
                connectionDist = 80;
            } else {
                connectionDist = 150;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            adjustConfig();
            // 窗口改变时重新分布粒子，防止粒子跑出屏幕
            initParticles(); 
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(random(-0.5, 0.5), random(-0.5, 0.5));
                this.size = random(2, 4);
            }
            update() {
                this.pos.add(this.vel);
                if (this.pos.x < 0 || this.pos.x > width) this.vel.x *= -1;
                if (this.pos.y < 0 || this.pos.y > height) this.vel.y *= -1;
            }
            display() {
                noStroke();
                fill(255, 220);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }
    </script>
</body>
</html>
