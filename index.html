<!DOCTYPE html>
<html lang="zh">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <meta charset="utf-8" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
        }
        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background: #6200ee;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }
        #more-icon {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            text-decoration: none;
            font-size: 24px;
            z-index: 10;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        #more-icon:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>你想给我什么答案？<br>What answer are you gonna give me?</h1>
        <input type="text" id="userInput" placeholder="输入你的答案...">
        <button onclick="handleSubmit()">提交 Submit</button>
    </div>
    
    <a href="data.html" id="more-icon" title="查看更多数据">📜</a>

    <script>
        let particles = [];
        let nodeCount = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            // 初始化：根据现有数据量设置粒子
            let data = JSON.parse(localStorage.getItem('formData') || "[]");
            nodeCount = data.length;
            initParticles();
        }

        function draw() {
            background(10, 10, 25, 50); // 带尾迹的黑色背景
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].display();
                // 连线逻辑
                for (let j = i + 1; j < particles.length; j++) {
                    let d = dist(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    if (d < 150) {
                        stroke(100, 150, 255, map(d, 0, 150, 255, 0));
                        line(particles[i].pos.x, particles[i].pos.y, particles[j].pos.x, particles[j].pos.y);
                    }
                }
            }
        }

        function handleSubmit() {
            const inputVal = document.getElementById('userInput').value;
            if (!inputVal) return;

            // 1. 记录数据到 localStorage
            let data = JSON.parse(localStorage.getItem('formData') || "[]");
            const newEntry = {
                id: Date.now(), // 使用时间戳作为简单ID
                content: inputVal,
                timestamp: new Date().toLocaleString()
            };
            data.push(newEntry);
            localStorage.setItem('formData', JSON.stringify(data));

            // 2. 更新粒子系统
            nodeCount = data.length;
            initParticles();

            // 清空输入框
            document.getElementById('userInput').value = "";
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < nodeCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(random(-1, 1), random(-1, 1));
                this.size = 5;
            }

            update() {
                this.pos.add(this.vel);
                if (this.pos.x < 0 || this.pos.x > width) this.vel.x *= -1;
                if (this.pos.y < 0 || this.pos.y > height) this.vel.y *= -1;
            }

            display() {
                noStroke();
                fill(255, 200);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
